<!doctype html>
<html lang="id" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.4/dist/sweetalert2.all.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Special For You 💌</title>
  </head>
  <body>
    <!-- Preloader -->
    <div class="preload">
      <div class="preload-inner">
        <div class="preload-heart">♥</div>
        <div class="preload-dots">
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
    </div>

    <!-- Main wrapper -->
    <div class="main" style="background-image: url(&quot;ast/bg.webp&quot;)">
      <div class="bg-love"></div>

      <!-- Decorative elements -->
      <div class="elements">
        <img src="ast/bg2.webp" class="bg" alt="" />
        <div class="butterfly">
          <img src="ast/butterfly.webp" alt="" />
        </div>
        <img src="ast/flower.webp" class="flower" alt="" />
      </div>

      <!-- Book -->
      <div class="book fs"></div>

      <!-- Controls -->
      <div class="btn-container">
        <button class="open-btn show">Buka 💌</button>
        <div class="nav">
          <button class="prev-btn" aria-label="Sebelumnya">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#fff" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
            </svg>
          </button>
          <span class="page-indicator">1 / 10</span>
          <button class="next-btn" aria-label="Selanjutnya">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#fff" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
            </svg>
          </button>
        </div>
        <button class="pesan-btn">Kirim Pesan 💌</button>
      </div>
    </div>

    <script src="s.js"></script>
  </body>
</html>
